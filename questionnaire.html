<!DOCTYPE html>
<html lang="fr-CA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Parle-nous de ton projet et reçois ton plan d'affaires complet généré par IA. Bildop.">
  <title>Bildop — Parle-nous de ton projet</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav" id="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">BILDOP</a>
      <ul class="nav__links" id="navLinks">
        <li><a href="index.html">← Retour au site</a></li>
      </ul>
      <button class="nav__toggle" id="navToggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Questionnaire -->
  <div class="questionnaire">
    <div class="questionnaire__container">

      <!-- Progress -->
      <div class="progress-bar">
        <div class="progress-bar__fill" id="progressFill" style="width: 0%"></div>
      </div>
      <div class="progress-info">
        <span><strong id="categoryName">Informations générales</strong></span>
        <span id="questionProgress">Étape 1 de 9</span>
      </div>

      <!-- Category Steps -->
      <div class="category-stepper" id="categoryStepper">
        <!-- Generated by JS -->
      </div>

      <!-- Question Card -->
      <div class="question-card" id="questionCard">
        <!-- Dynamically rendered -->
      </div>

      <!-- Navigation -->
      <div class="question-nav">
        <button class="btn btn--secondary" id="btnPrev" disabled>← Précédent</button>
        <button class="btn btn--primary" id="btnNext">Suivant →</button>
      </div>

    </div>
  </div>

  <script src="js/questionnaire.js"></script>
</body>
</html>
